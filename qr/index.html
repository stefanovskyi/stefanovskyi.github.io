<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Scan to connect with Oleksandr Stefanovskyi." />
    <title>Scan to connect · Oleksandr Stefanovskyi</title>
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      [hidden] {
        display: none !important;
      }
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: #000;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: calc(24px + env(safe-area-inset-top)) 20px
          calc(24px + env(safe-area-inset-bottom));
        text-align: center;
      }
      .qr-link {
        display: block;
        text-decoration: none;
        border-radius: 28px;
        outline: none;
        transition: transform 0.12s ease;
      }
      .qr-link:active {
        transform: scale(0.98);
      }
      .qr-link:focus-visible {
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.6);
      }
      .qr-card {
        width: min(80vmin, 440px);
        aspect-ratio: 1 / 1;
        background: #fff;
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06),
          0 24px 60px -20px rgba(0, 0, 0, 0.9);
      }
      .qr {
        width: 100%;
        height: 100%;
      }
      .qr svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .label {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #cbd5e1;
      }
      .caption {
        margin: 0;
        font-size: 0.85rem;
        color: #94a3b8;
      }
      .hint {
        margin: 0;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #475569;
      }
      /* Event selector */
      .events {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: min(80vmin, 440px);
      }
      .event-btn {
        appearance: none;
        -webkit-appearance: none;
        font: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        color: #cbd5e1;
        background: #141417;
        border: 1px solid #2a2a2e;
        border-radius: 9999px;
        padding: 9px 15px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s ease, color 0.15s ease,
          border-color 0.15s ease, transform 0.08s ease;
      }
      .event-btn:active {
        transform: scale(0.96);
      }
      .event-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6);
      }
      .event-btn[aria-pressed="true"] {
        background: #fff;
        color: #000;
        border-color: #fff;
      }
      /* Intelliarts brand cue on the active RAISE button */
      .event-btn[data-variant="raise"][aria-pressed="true"] {
        background: #ff5800;
        color: #fff;
        border-color: #ff5800;
      }
    </style>
  </head>

      <p class="hint">Tap to open</p>

    <script>
      (function () {
        "use strict";
        var BASE = "https://stefanovskyi.com/contact/";
        var VARIANTS = {
          general: { ctx: "", label: "General", caption: "Scan to connect" },
          raise: {
            ctx: "raise",
            label: "RAISE Summit · Paris",
            caption: "Meet me with Intelliarts"
          }
        };

        var qrs = document.querySelectorAll(".qr");
        var btns = document.querySelectorAll(".event-btn");
        var canvas = document.getElementById("canvas");
        var labelEl = document.getElementById("label");
        var captionEl = document.getElementById("caption");
        var current = "general";

        function select(variant, track) {
          if (!Object.prototype.hasOwnProperty.call(VARIANTS, variant))
            variant = "general";
          current = variant;
          var cfg = VARIANTS[variant];

          // Show only the matching QR variant.
          for (var i = 0; i < qrs.length; i++) {
            qrs[i].hidden = qrs[i].getAttribute("data-variant") !== variant;
          }
          // Point the canvas link at the same destination the QR encodes.
          canvas.setAttribute("href", cfg.ctx ? BASE + "?ctx=" + cfg.ctx : BASE);
          labelEl.textContent = cfg.label;
          captionEl.textContent = cfg.caption;
          // Reflect the active event in the buttons.
          for (var j = 0; j < btns.length; j++) {
            btns[j].setAttribute(
              "aria-pressed",
              btns[j].getAttribute("data-variant") === variant ? "true" : "false"
            );
          }
          // Keep the URL in sync so the choice is bookmarkable (no history spam).
          try {
            history.replaceState(
              null,
              "",
              variant === "general"
                ? location.pathname
                : location.pathname + "?v=" + variant
            );
          } catch (e) {}
          if (track) trackPresented();
        }

        // Initial selection from ?v= (default general); no tracking yet.
        select(new URLSearchParams(location.search).get("v") || "general", false);

        for (var b = 0; b < btns.length; b++) {
          btns[b].addEventListener("click", function (ev) {
            select(ev.currentTarget.getAttribute("data-variant"), true);
          });
        }

                    return u.toString(1) + ".people (stub)";

                    "init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagPayload isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug getPageViewId".split(
